model_name: telos_edit_workspace_marker
model_class: minisweagent.models.test_models.DeterministicModel
outputs:
  - role: assistant
    content: "Writing a deterministic Python marker file."
    extra:
      actions:
        - command: "printf 'TELOS_DETERMINISTIC_EDIT_MARKER = True\n' > telos_marker.py"
  - role: assistant
    content: "Submitting after deterministic edit."
    extra:
      actions:
        - command: "echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT"
