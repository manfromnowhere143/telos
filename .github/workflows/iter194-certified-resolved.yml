name: iter194-certified-resolved

# Manual only. Runs the iter194 repo-correct execution harness on a native-x86 runner (no emulation).
# For each iter193 candidate, inside its pinned official SWE-bench container, it runs the committed
# official eval_script under gold and under the variant source patch, capturing the full per-test output
# with the repo-correct command (runtests.py for django, pytest for the others). It never runs on push.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute:
    name: iter194 repo-correct execution (x86, native)
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Run iter194 execution
        run: |
          chmod +x scripts/ci_iter194_execute.sh
          bash scripts/ci_iter194_execute.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iter194-execution
          path: experiments/iter194_certified_resolved_oracle_and_runner_fix/proof/raw/execution/
          retention-days: 14
