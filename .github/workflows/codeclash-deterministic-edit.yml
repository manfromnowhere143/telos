name: codeclash-deterministic-edit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  battlesnake-deterministic-edit:
    name: battlesnake deterministic edit pvp
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CODECLASH_COMMIT: 381cdfa05a35e8acd35853b9fc7e13005121b127
      CODECLASH_DIR: /tmp/telos-codeclash
      CODECLASH_OUT: /tmp/telos-codeclash-deterministic-edit-smoke
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Docker readiness
        run: |
          docker version
          docker info

      - name: Clone pinned CodeClash
        run: |
          git clone https://github.com/CodeClash-ai/CodeClash.git "$CODECLASH_DIR"
          cd "$CODECLASH_DIR"
          git checkout "$CODECLASH_COMMIT"
          git rev-parse HEAD | tee /tmp/telos-codeclash-commit.txt

      - name: Apply Telos deterministic edit overlay
        run: |
          cp experiments/iter06_deterministic_edit_slice/proof/overlay/configs/mini/telos_edit_battlesnake_marker.yaml "$CODECLASH_DIR/configs/mini/telos_edit_battlesnake_marker.yaml"
          cp experiments/iter06_deterministic_edit_slice/proof/overlay/configs/test/telos_battlesnake_edit_test.yaml "$CODECLASH_DIR/configs/test/telos_battlesnake_edit_test.yaml"

      - name: Install CodeClash
        run: |
          cd "$CODECLASH_DIR"
          uv sync --python 3.11 --extra dev

      - name: CodeClash BattleSnake deterministic edit run
        run: |
          set -o pipefail
          rm -rf "$CODECLASH_OUT"
          mkdir -p "$CODECLASH_OUT"
          cd "$CODECLASH_DIR"
          uv run codeclash run configs/test/telos_battlesnake_edit_test.yaml -o "$CODECLASH_OUT" 2>&1 | tee /tmp/telos-codeclash-deterministic-edit-run.log

      - name: Summarize deterministic edit artifacts
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          out = Path(os.environ["CODECLASH_OUT"])
          metadata_files = sorted(out.glob("*/metadata.json"))
          if not metadata_files:
              raise SystemExit(f"no metadata.json found under {out}")

          metadata_path = metadata_files[-1]
          metadata = json.loads(metadata_path.read_text())
          round_stats = metadata.get("round_stats", {})
          if not round_stats:
              raise SystemExit("metadata has no round_stats")

          trajectories = sorted(out.glob("*/players/p1/*.traj.json"))
          if not trajectories:
              raise SystemExit("missing p1 Mini-SWE-Agent trajectory")

          p1 = next((agent for agent in metadata.get("agents", []) if agent.get("name") == "p1"), None)
          if not p1:
              raise SystemExit("metadata missing p1 agent")

          agent_stats = p1.get("agent_stats", {})
          if not agent_stats:
              raise SystemExit("p1 agent_stats missing")
          for round_id, stats in agent_stats.items():
              if stats.get("cost") not in (0, 0.0):
                  raise SystemExit(f"p1 round {round_id} cost was not zero: {stats}")
              if int(stats.get("api_calls", 0)) < 2:
                  raise SystemExit(f"p1 round {round_id} had fewer than two deterministic model invocations: {stats}")

          p1_change_files = sorted(out.glob("*/players/p1/changes_r*.json"))
          if not p1_change_files:
              raise SystemExit("missing p1 change files")
          p1_changes = [json.loads(path.read_text()) for path in p1_change_files]
          changed_files = sorted({
              filename
              for change in p1_changes
              for filename in (change.get("modified_files") or {})
          })
          expected_file = "telos_marker.py"
          if expected_file not in changed_files:
              raise SystemExit(f"{expected_file} not found in p1 modified files: {changed_files}")
          if not any((change.get("full_diff") or "").strip() for change in p1_changes):
              raise SystemExit("p1 full_diff is empty")

          p2_change_files = sorted(out.glob("*/players/p2/changes_r*.json"))
          if not p2_change_files:
              raise SystemExit("missing p2 change files")

          summary = {
              "schema_version": "telos.deterministic_edit_smoke.summary.v1",
              "codeclash_commit": os.environ["CODECLASH_COMMIT"],
              "config": "configs/test/telos_battlesnake_edit_test.yaml",
              "overlay_model_config": "configs/mini/telos_edit_battlesnake_marker.yaml",
              "output_root": str(out),
              "metadata_path": str(metadata_path),
              "tournament_id": metadata.get("tournament_id"),
              "game": metadata.get("game", {}).get("name"),
              "round_count": len(round_stats),
              "agent_names": [agent.get("name") for agent in metadata.get("agents", [])],
              "p1_agent_stats": agent_stats,
              "p1_provider_cost_zero": all(stats.get("cost") in (0, 0.0) for stats in agent_stats.values()),
              "p1_model_invocations": sum(int(stats.get("api_calls", 0)) for stats in agent_stats.values()),
              "p1_trajectory_paths": [str(path) for path in trajectories],
              "p1_change_paths": [str(path) for path in p1_change_files],
              "p1_modified_files": changed_files,
              "p1_non_empty_diff": True,
              "p2_change_file_count": len(p2_change_files),
          }
          Path("/tmp/telos-codeclash-deterministic-edit-summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n"
          )
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Upload deterministic edit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codeclash-deterministic-edit-smoke
          if-no-files-found: error
          path: |
            /tmp/telos-codeclash-deterministic-edit-smoke/**
            /tmp/telos-codeclash-commit.txt
            /tmp/telos-codeclash-deterministic-edit-run.log
            /tmp/telos-codeclash-deterministic-edit-summary.json
