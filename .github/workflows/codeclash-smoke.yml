name: codeclash-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dummy-tournament:
    name: dummy tournament
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CODECLASH_COMMIT: 381cdfa05a35e8acd35853b9fc7e13005121b127
      CODECLASH_DIR: /tmp/telos-codeclash
      CODECLASH_OUT: /tmp/telos-codeclash-dummy-smoke
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.16"

      - name: Docker readiness
        run: |
          docker version
          docker info

      - name: Clone pinned CodeClash
        run: |
          git clone https://github.com/CodeClash-ai/CodeClash.git "$CODECLASH_DIR"
          cd "$CODECLASH_DIR"
          git checkout "$CODECLASH_COMMIT"
          git rev-parse HEAD | tee /tmp/telos-codeclash-commit.txt

      - name: Install CodeClash
        run: |
          cd "$CODECLASH_DIR"
          uv sync --python 3.11 --extra dev

      - name: CodeClash unit smoke
        run: |
          cd "$CODECLASH_DIR"
          uv run pytest tests/arenas/test_dummy.py -q | tee /tmp/telos-codeclash-unit.log

      - name: CodeClash no-LLM dummy tournament
        run: |
          rm -rf "$CODECLASH_OUT"
          mkdir -p "$CODECLASH_OUT"
          cd "$CODECLASH_DIR"
          uv run codeclash run configs/test/dummy.yaml -o "$CODECLASH_OUT" 2>&1 | tee /tmp/telos-codeclash-run.log

      - name: Summarize smoke artifacts
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          out = Path(os.environ["CODECLASH_OUT"])
          metadata_files = sorted(out.glob("*/metadata.json"))
          if not metadata_files:
              raise SystemExit(f"no metadata.json found under {out}")

          metadata_path = metadata_files[-1]
          metadata = json.loads(metadata_path.read_text())
          round_stats = metadata.get("round_stats", {})
          if not round_stats:
              raise SystemExit("metadata has no round_stats")

          summary = {
              "schema_version": "telos.codeclash_smoke.summary.v1",
              "codeclash_commit": os.environ["CODECLASH_COMMIT"],
              "output_root": str(out),
              "metadata_path": str(metadata_path),
              "tournament_id": metadata.get("id") or metadata.get("tournament_id"),
              "game": metadata.get("game", {}).get("name"),
              "agent_names": [agent.get("name") for agent in metadata.get("agents", [])],
              "round_count": len(round_stats),
              "round_stats_keys": sorted(round_stats.keys(), key=str),
          }
          Path("/tmp/telos-codeclash-summary.json").write_text(json.dumps(summary, indent=2) + "\n")
          print(json.dumps(summary, indent=2))
          PY

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codeclash-dummy-smoke
          if-no-files-found: error
          path: |
            /tmp/telos-codeclash-dummy-smoke/**
            /tmp/telos-codeclash-commit.txt
            /tmp/telos-codeclash-unit.log
            /tmp/telos-codeclash-run.log
            /tmp/telos-codeclash-summary.json
