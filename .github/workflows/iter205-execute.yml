name: iter205-execute
on:
  workflow_dispatch:
    inputs:
      expected_primary_sha:
        description: Exact green master commit approved before the sole eligible iter205 dispatch
        required: true
        type: string
concurrency:
  group: iter205-canonical-execution
  cancel-in-progress: false
permissions:
  actions: read
  checks: read
  contents: read
jobs:
  authorize:
    name: authorize sole attempt-1 green-primary iter205 dispatch
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      primary_ci_authorization: ${{ steps.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify exact repository, primary ref, commit, and historical anchor
        env:
          EXPECTED_PRIMARY_SHA: ${{ inputs.expected_primary_sha }}
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "manfromnowhere143/telos"
          test "${GITHUB_REF}" = "refs/heads/master"
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test "${GITHUB_SHA}" = "${EXPECTED_PRIMARY_SHA}"
          [[ "${EXPECTED_PRIMARY_SHA}" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "${EXPECTED_PRIMARY_SHA}"
          git cat-file -e 'c1137f896b7ee3c9a26ee35bcda2c5f5c6b79446^{commit}'
          git merge-base --is-ancestor c1137f896b7ee3c9a26ee35bcda2c5f5c6b79446 "${EXPECTED_PRIMARY_SHA}"
      - name: Verify exact iter204 pre-dispatch infrastructure null
        run: python3 -I -S scripts/validate_iter204_pre_dispatch_null.py
      - name: Verify green primary CI and first canonical run identity
        id: authorize
        env:
          EXPECTED_PRIMARY_SHA: ${{ inputs.expected_primary_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 -I -S - <<'PY'
          import json
          import base64
          import os
          import urllib.parse
          import urllib.request

          api_root = os.environ["GITHUB_API_URL"].rstrip("/")
          repository = os.environ["GITHUB_REPOSITORY"]
          expected_sha = os.environ["EXPECTED_PRIMARY_SHA"]
          current_run_id = int(os.environ["GITHUB_RUN_ID"])
          current_attempt = int(os.environ["GITHUB_RUN_ATTEMPT"])
          token = os.environ["GH_TOKEN"]

          def get(path, parameters=None):
              query = "" if not parameters else "?" + urllib.parse.urlencode(parameters)
              request = urllib.request.Request(
                  f"{api_root}/repos/{repository}/{path}{query}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          iter205_workflow = get("actions/workflows/iter205-execute.yml")
          if (
              iter205_workflow.get("name") != "iter205-execute"
              or iter205_workflow.get("path") != ".github/workflows/iter205-execute.yml"
              or iter205_workflow.get("state") != "active"
          ):
              raise SystemExit("iter205 workflow is not an active, server-accepted workflow")

          current = get(f"actions/runs/{current_run_id}")
          if (
              current.get("event") != "workflow_dispatch"
              or current.get("head_branch") != "master"
              or current.get("head_sha") != expected_sha
              or current.get("path") != ".github/workflows/iter205-execute.yml"
              or current.get("run_attempt") != 1
              or current_attempt != 1
          ):
              raise SystemExit("current run is not the sole authorized attempt-1 master dispatch")

          iter205_runs = []
          for page in range(1, 11):
              payload = get(
                  "actions/workflows/iter205-execute.yml/runs",
                  {
                      "page": page,
                      "per_page": 100,
                  },
              )
              rows = payload.get("workflow_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate global iter205 workflow history")
              iter205_runs.extend(
                  int(row["id"])
                  for row in rows
                  if isinstance(row.get("id"), int)
              )
              if len(rows) < 100:
                  break
          else:
              raise SystemExit("iter205 workflow history exceeds the bounded audit window")
          if iter205_runs != [current_run_id]:
              raise SystemExit(
                  "iter205 permits exactly one global workflow dispatch and attempt 1 only"
              )

          iter205_dispatch_runs = []
          for page in range(1, 11):
              payload = get(
                  "actions/workflows/iter205-execute.yml/runs",
                  {
                      "event": "workflow_dispatch",
                      "page": page,
                      "per_page": 100,
                  },
              )
              rows = payload.get("workflow_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate iter205 workflow_dispatch history")
              iter205_dispatch_runs.extend(
                  int(row["id"])
                  for row in rows
                  if isinstance(row.get("id"), int)
              )
              if len(rows) < 100:
                  break
          else:
              raise SystemExit(
                  "iter205 workflow_dispatch history exceeds the bounded audit window"
              )
          if iter205_dispatch_runs != [current_run_id]:
              raise SystemExit(
                  "iter205 dispatch history must contain exactly the current run"
              )

          iter204_workflow_id = 314113289
          iter204_workflow = get(f"actions/workflows/{iter204_workflow_id}")
          if (
              iter204_workflow.get("id") != iter204_workflow_id
              or iter204_workflow.get("name") != ".github/workflows/iter204-execute.yml"
              or iter204_workflow.get("path") != ".github/workflows/iter204-execute.yml"
              or iter204_workflow.get("state") != "active"
          ):
              raise SystemExit("the exact iter204 workflow identity differs")

          all_iter204_runs = []
          for page in range(1, 11):
              payload = get(
                  f"actions/workflows/{iter204_workflow_id}/runs",
                  {"page": page, "per_page": 100},
              )
              rows = payload.get("workflow_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate iter204 workflow dispatch history")
              all_iter204_runs.extend(row for row in rows if isinstance(row, dict))
              if len(rows) < 100:
                  break
          else:
              raise SystemExit("iter204 workflow history exceeds the bounded audit window")

          expected_iter204_push_failures = {
              29465584664: {
                  "head_branch": "agent/iter204-infrastructure-recovery",
                  "head_sha": "8342315dd2fa7ec865bd7c654ec4ec098675dfab",
              },
              29465924803: {
                  "head_branch": "master",
                  "head_sha": "c1137f896b7ee3c9a26ee35bcda2c5f5c6b79446",
              },
          }
          iter204_by_id = {
              row.get("id"): row
              for row in all_iter204_runs
              if isinstance(row.get("id"), int)
          }
          if (
              len(all_iter204_runs) != len(expected_iter204_push_failures)
              or set(iter204_by_id) != set(expected_iter204_push_failures)
          ):
              raise SystemExit("iter204 workflow history differs from its two parse failures")
          for run_id, expected in expected_iter204_push_failures.items():
              row = iter204_by_id[run_id]
              if (
                  row.get("event") != "push"
                  or row.get("head_branch") != expected["head_branch"]
                  or row.get("head_sha") != expected["head_sha"]
                  or row.get("path") != ".github/workflows/iter204-execute.yml"
                  or row.get("run_attempt") != 1
                  or row.get("status") != "completed"
                  or row.get("conclusion") != "failure"
              ):
                  raise SystemExit("an exact iter204 parse-failure run differs")
              jobs = get(f"actions/runs/{run_id}/attempts/1/jobs", {"per_page": 100})
              artifacts = get(f"actions/runs/{run_id}/artifacts", {"per_page": 100})
              if jobs.get("total_count") != 0 or jobs.get("jobs") != []:
                  raise SystemExit("an iter204 parse failure unexpectedly started a job")
              if artifacts.get("total_count") != 0 or artifacts.get("artifacts") != []:
                  raise SystemExit("an iter204 parse failure unexpectedly retained an artifact")
          if any(row.get("event") == "workflow_dispatch" for row in all_iter204_runs):
              raise SystemExit(
                  "iter204 must have zero workflow_dispatch runs before iter205"
              )

          iter204_primary_sha = "c1137f896b7ee3c9a26ee35bcda2c5f5c6b79446"
          iter204_primary_ci_run_id = 29465925393
          iter204_ci = get(f"actions/runs/{iter204_primary_ci_run_id}")
          if (
              iter204_ci.get("id") != iter204_primary_ci_run_id
              or iter204_ci.get("run_attempt") != 1
              or iter204_ci.get("event") != "push"
              or iter204_ci.get("head_branch") != "master"
              or iter204_ci.get("head_sha") != iter204_primary_sha
              or iter204_ci.get("path") != ".github/workflows/ci.yml"
              or iter204_ci.get("status") != "completed"
              or iter204_ci.get("conclusion") != "success"
          ):
              raise SystemExit("the exact merged iter204 primary-CI anchor differs")

          ci_runs = []
          for page in range(1, 11):
              payload = get(
                  "actions/workflows/ci.yml/runs",
                  {
                      "branch": "master",
                      "event": "push",
                      "page": page,
                      "per_page": 100,
                      "status": "completed",
                  },
              )
              rows = payload.get("workflow_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate primary CI runs")
              ci_runs.extend(
                  row
                  for row in rows
                  if row.get("head_sha") == expected_sha
                  and row.get("head_branch") == "master"
                  and row.get("event") == "push"
                  and row.get("path") == ".github/workflows/ci.yml"
                  and row.get("status") == "completed"
                  and row.get("conclusion") == "success"
              )
              if len(rows) < 100:
                  break
          if len({row.get("id") for row in ci_runs}) != 1:
              raise SystemExit("approved primary commit has no successful completed ci.yml push run")
          ci_run = max(ci_runs, key=lambda row: int(row.get("run_attempt", 0)))
          ci_run_id = ci_run.get("id")
          ci_run_attempt = ci_run.get("run_attempt")
          if not isinstance(ci_run_id, int) or not isinstance(ci_run_attempt, int):
              raise SystemExit("primary CI run identity is malformed")

          check_rows = []
          for page in range(1, 11):
              payload = get(
                  f"commits/{expected_sha}/check-runs",
                  {"filter": "all", "page": page, "per_page": 100},
              )
              rows = payload.get("check_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate primary CI check runs")
              check_rows.extend(rows)
              if len(rows) < 100:
                  break
          else:
              raise SystemExit("primary CI check history exceeds the bounded audit window")

          required_names = ("verify py3.11", "verify py3.12")
          selected_checks = []
          for name in required_names:
              expected_prefix = (
                  f"https://github.com/{repository}/actions/runs/{ci_run_id}/job/"
              )
              candidates = [
                  row
                  for row in check_rows
                  if row.get("name") == name
                  and row.get("status") == "completed"
                  and row.get("conclusion") == "success"
                  and isinstance(row.get("app"), dict)
                  and row["app"].get("slug") == "github-actions"
                  and isinstance(row.get("id"), int)
                  and row.get("details_url") == f"{expected_prefix}{row['id']}"
              ]
              if not candidates:
                  raise SystemExit(f"required primary CI check is not complete/success: {name}")
              selected = max(candidates, key=lambda row: row["id"])
              selected_checks.append(
                  {
                      "app_slug": "github-actions",
                      "conclusion": "success",
                      "details_url": selected["details_url"],
                      "id": selected["id"],
                      "name": name,
                      "status": "completed",
                  }
              )

          authorization = {
              "approved_commit_sha": expected_sha,
              "iter204_dispatch_count": 0,
              "iter204_primary_ci_run_id": iter204_primary_ci_run_id,
              "iter204_primary_sha": iter204_primary_sha,
              "iter204_workflow_id": iter204_workflow_id,
              "primary_ci_event": "push",
              "primary_ci_head_branch": "master",
              "primary_ci_run_attempt": ci_run_attempt,
              "primary_ci_run_id": ci_run_id,
              "primary_ci_workflow_path": ".github/workflows/ci.yml",
              "required_checks": selected_checks,
              "schema_version": "telos.iter205.primary_ci_authorization.v1",
          }
          encoded = base64.urlsafe_b64encode(
              json.dumps(
                  authorization,
                  sort_keys=True,
                  separators=(",", ":"),
                  allow_nan=False,
              ).encode()
          ).decode()
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"primary_ci_authorization={encoded}\n")
          PY

  smoke:
    name: iter205 no-science exact log-driver smoke
    needs: authorize
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      TELOS_ITER205_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
      - name: Verify frozen scientific inputs and additive iter205 runtime
        run: |
          python3 -I -S scripts/build_iter203_safety_recovery.py --check
          python3 -I -S scripts/build_iter203_runtime_manifest.py --check
          python3 -I -S scripts/validate_iter204_pre_dispatch_null.py
          python3 -I -S scripts/build_iter205_runtime_manifest.py --check
      - name: Run no-science log-driver smoke
        run: bash scripts/ci_iter205_smoke.sh
      - name: Upload bounded smoke evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter205-no-science-smoke-${{ github.run_id }}-attempt-1
          path: |
            experiments/iter205_iter204_workflow_context_recovery/proof/raw/smoke/*.json
            experiments/iter205_iter204_workflow_context_recovery/proof/raw/smoke/*.diagnostic.log
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14

  execute:
    name: iter205 certify all + execute safe witness shard ${{ matrix.shard }}/8
    needs: [authorize, smoke]
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    env:
      TELOS_ITER205_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
      TELOS_ITER205_SHARD_COUNT: 8
      TELOS_ITER205_SHARD_INDEX: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
      - name: Download exact successful same-run smoke evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: iter205-no-science-smoke-${{ github.run_id }}-attempt-1
          path: ${{ runner.temp }}/iter205-smoke
      - name: Verify frozen scientific inputs and additive iter205 runtime
        run: |
          python3 -I -S scripts/build_iter203_safety_recovery.py --check
          python3 -I -S scripts/build_iter203_runtime_manifest.py --check
          python3 -I -S scripts/validate_iter204_pre_dispatch_null.py
          python3 -I -S scripts/build_iter205_runtime_manifest.py --check
      - name: Run iter205 execution shard
        env:
          TELOS_ITER205_SMOKE_RECEIPT: ${{ runner.temp }}/iter205-smoke/smoke.receipt.json
        run: bash scripts/ci_iter205_execute.sh
      - name: Upload receipt-eligible shard evidence
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter205-execution-run-${{ github.run_id }}-attempt-1-shard-${{ matrix.shard }}-of-8
          path: experiments/iter205_iter204_workflow_context_recovery/proof/raw/execution/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 14
      - name: Upload bounded visible runtime diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter205-runtime-diagnostics-${{ github.run_id }}-attempt-1-shard-${{ matrix.shard }}-of-8
          path: |
            experiments/iter205_iter204_workflow_context_recovery/proof/raw/runtime_diagnostics/*.json
            experiments/iter205_iter204_workflow_context_recovery/proof/raw/runtime_diagnostics/*.diagnostic.log
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14
      - name: Upload partial scientific evidence for debugging only
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter205-execution-debug-${{ github.run_id }}-attempt-1-shard-${{ matrix.shard }}-of-8
          path: experiments/iter205_iter204_workflow_context_recovery/proof/raw/execution/
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14

  collect:
    name: iter205 collect exact attempt-1 eight-shard corpus
    needs: [authorize, smoke, execute]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TELOS_ITER205_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download receipt-eligible attempt-1 shards without merging
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: iter205-execution-run-${{ github.run_id }}-attempt-1-shard-*-of-8
          path: ${{ runner.temp }}/iter205-shards
          merge-multiple: false
      - name: Collect and verify exact execution corpus
        run: |
          python3 -I -S scripts/collect_iter205_execution.py collect \
            --artifacts-dir "${{ runner.temp }}/iter205-shards" \
            --output-dir experiments/iter205_iter204_workflow_context_recovery/proof/raw/execution \
            --aggregate-receipt experiments/iter205_iter204_workflow_context_recovery/proof/raw/execution/_telos_iter205_execution_complete.receipt.json \
            --spec-index experiments/iter203_iter202_safety_recovery/proof/raw/specs/index.json \
            --runtime-manifest experiments/iter205_iter204_workflow_context_recovery/proof/raw/runtime_manifest.json
          python3 -I -S scripts/collect_iter205_execution.py check \
            --execution-dir experiments/iter205_iter204_workflow_context_recovery/proof/raw/execution \
            --aggregate-receipt experiments/iter205_iter204_workflow_context_recovery/proof/raw/execution/_telos_iter205_execution_complete.receipt.json \
            --spec-index experiments/iter203_iter202_safety_recovery/proof/raw/specs/index.json \
            --runtime-manifest experiments/iter205_iter204_workflow_context_recovery/proof/raw/runtime_manifest.json
      - name: Upload complete verified execution corpus
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter205-execution-complete-${{ github.run_id }}-attempt-1
          path: experiments/iter205_iter204_workflow_context_recovery/proof/raw/execution/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 14
      - name: Upload collector failure evidence for debugging only
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter205-execution-collector-debug-${{ github.run_id }}-attempt-1
          path: |
            ${{ runner.temp }}/iter205-shards/
            experiments/iter205_iter204_workflow_context_recovery/proof/raw/execution/
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14
