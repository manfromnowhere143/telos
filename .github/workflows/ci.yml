name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    name: verify py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff

      - name: Compile
        run: python3 -m compileall telos scripts tests

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest -q

      - name: JSON guard
        run: python3 scripts/validate_json.py

      - name: Docs guard
        run: python3 scripts/validate_docs.py

      - name: Mission loop guard
        run: python3 scripts/validate_mission_loop.py

      - name: Target survey guard
        run: python3 scripts/validate_target_survey.py

      - name: Public slice guard
        run: python3 scripts/validate_public_slice.py

      - name: Agent behavior slice guard
        run: python3 scripts/validate_agent_behavior_slice.py

      - name: Deterministic edit slice guard
        run: python3 scripts/validate_deterministic_edit_slice.py

      - name: Provider model pilot slice guard
        run: python3 scripts/validate_provider_model_pilot_slice.py

      - name: Receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter01_receipt_dry_run/proof

      - name: CodeClash smoke receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter03_codeclash_smoke/proof

      - name: CodeClash smoke audit
        run: python3 scripts/audit_codeclash_smoke.py

      - name: Agent behavior smoke receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter05_agent_behavior_smoke/proof

      - name: Agent behavior smoke audit
        run: python3 scripts/audit_agent_behavior_smoke.py

      - name: Deterministic edit smoke receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter07_deterministic_edit_smoke/proof

      - name: Deterministic edit smoke audit
        run: python3 scripts/audit_deterministic_edit_smoke.py

      - name: Provider model pilot smoke receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter09_provider_model_pilot_smoke/proof

      - name: Provider model pilot smoke audit
        run: python3 scripts/audit_provider_model_pilot_smoke.py

      - name: Provider auth recovery receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter10_provider_auth_recovery/proof

      - name: Provider auth recovery audit
        run: python3 scripts/audit_provider_auth_recovery.py

      - name: Provider model pilot retry receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter11_provider_model_pilot_retry/proof

      - name: Provider model pilot retry audit
        run: python3 scripts/audit_provider_model_pilot_retry.py

      - name: Vertex model access recovery receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter12_vertex_model_access_recovery/proof

      - name: Vertex model access recovery audit
        run: python3 scripts/audit_vertex_model_access_recovery.py

      - name: Provider model pilot after access receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter13_provider_model_pilot_retry_after_access_recovery/proof

      - name: Provider model pilot after access audit
        run: python3 scripts/audit_provider_model_pilot_after_access.py

      - name: Provider diff quality review receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter14_provider_diff_quality_review/proof

      - name: Provider diff quality review audit
        run: python3 scripts/audit_provider_diff_quality_review.py

      - name: Provider strict diff rerun receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter15_provider_strict_diff_rerun/proof

      - name: Provider strict diff rerun audit
        run: python3 scripts/audit_provider_strict_diff_rerun.py

      - name: Provider workspace hygiene control receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter16_provider_workspace_hygiene_control/proof

      - name: Provider workspace hygiene control audit
        run: python3 scripts/audit_provider_workspace_hygiene_control.py

      - name: Provider lint hygiene control receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter17_provider_lint_hygiene_control/proof

      - name: Provider lint hygiene control audit
        run: python3 scripts/audit_provider_lint_hygiene_control.py

      - name: Provider behavior depth control receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter18_provider_behavior_depth_control/proof

      - name: Provider behavior depth control audit
        run: python3 scripts/audit_provider_behavior_depth_control.py

      - name: Provider final inspection control receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter19_provider_final_inspection_control/proof

      - name: Provider final inspection control audit
        run: python3 scripts/audit_provider_final_inspection_control.py

      - name: Behavior semantic verification receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter20_behavior_semantic_verification/proof

      - name: Behavior semantic verification audit
        run: python3 scripts/audit_behavior_semantic_verification.py

      - name: Learning ledger guard
        run: python3 scripts/validate_learning_ledger.py

      - name: Handoff guard
        run: python3 scripts/validate_handoff.py
