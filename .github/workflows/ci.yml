name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    name: verify py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff

      - name: Compile
        run: python3 -m compileall telos scripts tests

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest -q

      - name: JSON guard
        run: python3 scripts/validate_json.py

      - name: Docs guard
        run: python3 scripts/validate_docs.py

      - name: Mission loop guard
        run: python3 scripts/validate_mission_loop.py

      - name: Target survey guard
        run: python3 scripts/validate_target_survey.py

      - name: Public slice guard
        run: python3 scripts/validate_public_slice.py

      - name: Agent behavior slice guard
        run: python3 scripts/validate_agent_behavior_slice.py

      - name: Deterministic edit slice guard
        run: python3 scripts/validate_deterministic_edit_slice.py

      - name: Provider model pilot slice guard
        run: python3 scripts/validate_provider_model_pilot_slice.py

      - name: Receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter01_receipt_dry_run/proof

      - name: CodeClash smoke receipt guard
        run: python3 scripts/validate_receipts.py experiments/iter03_codeclash_smoke/proof

      - name: CodeClash smoke audit
        run: python3 scripts/audit_codeclash_smoke.py

      - name: Agent behavior smoke receipt guard
