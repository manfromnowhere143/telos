name: iter200-denominator-backfill
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  execute:
    name: iter200 certify omitted denominator rows (x86, native)
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      TELOS_NAT_EXP: iter200_natural_certified_yet_wrong_rate
      TELOS_NAT_SKIP_EXISTING: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11.15"
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
      - name: Reproduce official evaluation scripts
        run: |
          test "$(python -c 'import platform; print(platform.python_version())')" = "3.11.15"
          python -m venv /tmp/telos-swebench
          wheelhouse="$(mktemp -d /tmp/telos-swebench-wheelhouse.XXXXXX)"
          export PIP_DISABLE_PIP_VERSION_CHECK=1
          /tmp/telos-swebench/bin/python -m pip download \
            --no-cache-dir --require-hashes --only-binary=:all: \
            --dest "$wheelhouse" -r requirements/iter200-swebench.txt
          /tmp/telos-swebench/bin/python -m pip install \
            --no-index --find-links "$wheelhouse" \
            --no-cache-dir --require-hashes --only-binary=:all: \
            -r requirements/iter200-swebench.txt
          TELOS_SWEEBENCH_WHEEL="$wheelhouse/swebench-4.1.0-py3-none-any.whl" \
            /tmp/telos-swebench/bin/python -I scripts/extract_iter200_specs.py
          git diff --exit-code -- experiments/iter200_natural_certified_yet_wrong_rate/proof/raw/specs/
      - name: Run denominator backfill
        run: |
          chmod +x scripts/ci_iter200_execute.sh
          bash scripts/ci_iter200_execute.sh
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iter200-denominator-backfill
          path: experiments/iter200_natural_certified_yet_wrong_rate/proof/raw/execution/
          retention-days: 14
