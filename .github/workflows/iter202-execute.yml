name: iter202-execute
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  execute:
    name: iter202 certify + witness shard ${{ matrix.shard }}/8 (x86, native)
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    env:
      TELOS_NAT_EXP: iter202_natural_rate_scaled
      TELOS_NAT_SHARD_COUNT: 8
      TELOS_NAT_SHARD_INDEX: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
      - name: Verify immutable iter202 image lock
        run: python3 scripts/build_iter202_image_lock.py --check
      - name: Validate generated scenario safety and evidence binding
        run: python3 scripts/validate_iter202_scenario_safety.py
      - name: Verify complete iter202 runtime freeze
        run: python3 scripts/validate_iter202_runtime_freeze.py --check
      - name: Run iter202 execution
        run: |
          chmod +x scripts/ci_iter200_execute.sh
          bash scripts/ci_iter200_execute.sh
      - name: Upload verified shard evidence
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iter202-execution-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}-shard-${{ matrix.shard }}-of-8
          path: experiments/iter202_natural_rate_scaled/proof/raw/execution/
          if-no-files-found: error
          retention-days: 14
      - name: Upload partial shard evidence for debugging only
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iter202-execution-debug-${{ github.run_id }}-attempt-${{ github.run_attempt }}-shard-${{ matrix.shard }}-of-8
          path: experiments/iter202_natural_rate_scaled/proof/raw/execution/
          if-no-files-found: ignore
          retention-days: 14

  collect:
    name: iter202 collect exact eight-shard evidence
    needs: execute
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download collector-eligible shard evidence without merging
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: iter202-execution-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}-shard-*-of-8
          path: ${{ runner.temp }}/iter202-shards
          merge-multiple: false
      - name: Collect and verify the complete execution corpus
        run: |
          python3 scripts/collect_iter202_execution.py collect \
            --artifacts-dir "${{ runner.temp }}/iter202-shards" \
            --output-dir experiments/iter202_natural_rate_scaled/proof/raw/execution \
            --aggregate-receipt experiments/iter202_natural_rate_scaled/proof/raw/execution/_telos_iter202_execution_complete.receipt.json \
            --spec-index experiments/iter202_natural_rate_scaled/proof/raw/specs/index.json \
            --runtime-manifest experiments/iter202_natural_rate_scaled/proof/raw/runtime_manifest.json
          python3 scripts/collect_iter202_execution.py check \
            --execution-dir experiments/iter202_natural_rate_scaled/proof/raw/execution \
            --aggregate-receipt experiments/iter202_natural_rate_scaled/proof/raw/execution/_telos_iter202_execution_complete.receipt.json \
            --spec-index experiments/iter202_natural_rate_scaled/proof/raw/specs/index.json \
            --runtime-manifest experiments/iter202_natural_rate_scaled/proof/raw/runtime_manifest.json
      - name: Upload complete verified execution corpus
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iter202-execution-complete-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: experiments/iter202_natural_rate_scaled/proof/raw/execution/
          if-no-files-found: error
          retention-days: 14
      - name: Upload collector failure evidence for debugging only
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iter202-execution-collector-debug-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/iter202-shards/
            experiments/iter202_natural_rate_scaled/proof/raw/execution/
          if-no-files-found: ignore
          retention-days: 14
