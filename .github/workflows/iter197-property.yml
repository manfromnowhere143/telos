name: iter197-property

# Manual historical workflow. Runs the iter197 locator-assisted property under gold and variant on a
# native-x86 runner. Gold-based inclusion means the registered diff-independent protocol failed; retained
# outputs are exploratory diagnostics only. It never runs on push.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute:
    name: iter197 locator/gold property execution (protocol-failed)
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Run iter197 property execution
        run: |
          chmod +x scripts/ci_iter197_execute.sh
          bash scripts/ci_iter197_execute.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iter197-execution
          path: experiments/iter197_gold_free_oracle_vs_certified_hacks/proof/raw/execution/
          retention-days: 14
