name: iter203-execute
on:
  workflow_dispatch:
    inputs:
      expected_primary_sha:
        description: Exact green master commit approved before the first eligible iter203 dispatch
        required: true
        type: string
concurrency:
  group: iter203-canonical-execution
  cancel-in-progress: false
permissions:
  actions: read
  checks: read
  contents: read
jobs:
  authorize:
    name: authorize canonical green-primary iter203 dispatch
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      primary_ci_authorization: ${{ steps.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify exact repository, primary ref, commit, and historical anchor
        env:
          EXPECTED_PRIMARY_SHA: ${{ inputs.expected_primary_sha }}
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "manfromnowhere143/telos"
          test "${GITHUB_REF}" = "refs/heads/master"
          test "${GITHUB_SHA}" = "${EXPECTED_PRIMARY_SHA}"
          [[ "${EXPECTED_PRIMARY_SHA}" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "${EXPECTED_PRIMARY_SHA}"
          git cat-file -e 8b8809ed6b358d16eb08fe38f0f2edf4a284af0e^{commit}
          git merge-base --is-ancestor 8b8809ed6b358d16eb08fe38f0f2edf4a284af0e "${EXPECTED_PRIMARY_SHA}"
      - name: Verify green primary CI and first canonical run identity
        id: authorize
        env:
          EXPECTED_PRIMARY_SHA: ${{ inputs.expected_primary_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 -I -S - <<'PY'
          import json
          import base64
          import os
          import urllib.parse
          import urllib.request

          api_root = os.environ["GITHUB_API_URL"].rstrip("/")
          repository = os.environ["GITHUB_REPOSITORY"]
          expected_sha = os.environ["EXPECTED_PRIMARY_SHA"]
          current_run_id = int(os.environ["GITHUB_RUN_ID"])
          token = os.environ["GH_TOKEN"]

          def get(path, parameters=None):
              query = "" if not parameters else "?" + urllib.parse.urlencode(parameters)
              request = urllib.request.Request(
                  f"{api_root}/repos/{repository}/{path}{query}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          current = get(f"actions/runs/{current_run_id}")
          if (
              current.get("event") != "workflow_dispatch"
              or current.get("head_branch") != "master"
              or current.get("head_sha") != expected_sha
              or current.get("path") != ".github/workflows/iter203-execute.yml"
          ):
              raise SystemExit("current run is not the exact authorized master dispatch")

          matching_runs = []
          for page in range(1, 11):
              payload = get(
                  "actions/workflows/iter203-execute.yml/runs",
                  {
                      "branch": "master",
                      "event": "workflow_dispatch",
                      "page": page,
                      "per_page": 100,
                  },
              )
              rows = payload.get("workflow_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate iter203 workflow runs")
              matching_runs.extend(
                  int(row["id"])
                  for row in rows
                  if row.get("head_sha") == expected_sha and isinstance(row.get("id"), int)
              )
              if len(rows) < 100:
                  break
          else:
              raise SystemExit("iter203 workflow history exceeds the bounded audit window")
          if not matching_runs or current_run_id != min(matching_runs):
              raise SystemExit(
                  "this is not the first iter203 dispatch for the approved primary commit; "
                  "rerun every job of the canonical run instead"
              )

          ci_runs = []
          for page in range(1, 11):
              payload = get(
                  "actions/workflows/ci.yml/runs",
                  {
                      "branch": "master",
                      "event": "push",
                      "page": page,
                      "per_page": 100,
                      "status": "completed",
                  },
              )
              rows = payload.get("workflow_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate primary CI runs")
              ci_runs.extend(
                  row
                  for row in rows
                  if row.get("head_sha") == expected_sha
                  and row.get("head_branch") == "master"
                  and row.get("event") == "push"
                  and row.get("path") == ".github/workflows/ci.yml"
                  and row.get("status") == "completed"
                  and row.get("conclusion") == "success"
              )
              if len(rows) < 100:
                  break
          if len({row.get("id") for row in ci_runs}) != 1:
              raise SystemExit("approved primary commit has no successful completed ci.yml push run")
          ci_run = max(ci_runs, key=lambda row: int(row.get("run_attempt", 0)))
          ci_run_id = ci_run.get("id")
          ci_run_attempt = ci_run.get("run_attempt")
          if not isinstance(ci_run_id, int) or not isinstance(ci_run_attempt, int):
              raise SystemExit("primary CI run identity is malformed")

          check_rows = []
          for page in range(1, 11):
              payload = get(
                  f"commits/{expected_sha}/check-runs",
                  {"filter": "all", "page": page, "per_page": 100},
              )
              rows = payload.get("check_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate primary CI check runs")
              check_rows.extend(rows)
              if len(rows) < 100:
                  break
          else:
              raise SystemExit("primary CI check history exceeds the bounded audit window")

          required_names = ("verify py3.11", "verify py3.12")
          selected_checks = []
          for name in required_names:
              expected_prefix = (
                  f"https://github.com/{repository}/actions/runs/{ci_run_id}/job/"
              )
              candidates = [
                  row
                  for row in check_rows
                  if row.get("name") == name
                  and row.get("status") == "completed"
                  and row.get("conclusion") == "success"
                  and isinstance(row.get("app"), dict)
                  and row["app"].get("slug") == "github-actions"
                  and isinstance(row.get("id"), int)
                  and row.get("details_url") == f"{expected_prefix}{row['id']}"
              ]
              if not candidates:
                  raise SystemExit(f"required primary CI check is not complete/success: {name}")
              selected = max(candidates, key=lambda row: row["id"])
              selected_checks.append(
                  {
                      "app_slug": "github-actions",
                      "conclusion": "success",
                      "details_url": selected["details_url"],
                      "id": selected["id"],
                      "name": name,
                      "status": "completed",
                  }
              )

          authorization = {
              "approved_commit_sha": expected_sha,
              "primary_ci_event": "push",
              "primary_ci_head_branch": "master",
              "primary_ci_run_attempt": ci_run_attempt,
              "primary_ci_run_id": ci_run_id,
              "primary_ci_workflow_path": ".github/workflows/ci.yml",
              "required_checks": selected_checks,
              "schema_version": "telos.iter203.primary_ci_authorization.v1",
          }
          encoded = base64.urlsafe_b64encode(
              json.dumps(
                  authorization,
                  sort_keys=True,
                  separators=(",", ":"),
                  allow_nan=False,
              ).encode()
          ).decode()
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"primary_ci_authorization={encoded}\n")
          PY

  execute:
    name: iter203 certify all + execute safe witness shard ${{ matrix.shard }}/8
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    env:
      TELOS_ITER203_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
      TELOS_ITER203_SHARD_COUNT: 8
      TELOS_ITER203_SHARD_INDEX: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
      - name: Verify immutable iter203 safety-recovery bridge
        run: python3 -I -S scripts/build_iter203_safety_recovery.py --check
      - name: Verify separately versioned iter203 execution runtime
        run: python3 -I -S scripts/build_iter203_runtime_manifest.py --check
      - name: Run iter203 execution shard
        run: bash scripts/ci_iter203_execute.sh
      - name: Upload receipt-eligible shard evidence
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter203-execution-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}-shard-${{ matrix.shard }}-of-8
          path: experiments/iter203_iter202_safety_recovery/proof/raw/execution/
          if-no-files-found: error
          retention-days: 14
      - name: Upload partial shard evidence for debugging only
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter203-execution-debug-${{ github.run_id }}-attempt-${{ github.run_attempt }}-shard-${{ matrix.shard }}-of-8
          path: experiments/iter203_iter202_safety_recovery/proof/raw/execution/
          if-no-files-found: ignore
          retention-days: 14

  collect:
    name: iter203 collect exact same-attempt eight-shard corpus
    needs: [authorize, execute]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TELOS_ITER203_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download receipt-eligible shards without merging
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: iter203-execution-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}-shard-*-of-8
          path: ${{ runner.temp }}/iter203-shards
          merge-multiple: false
      - name: Collect and verify exact execution corpus
        run: |
          python3 -I -S scripts/collect_iter203_execution.py collect \
            --artifacts-dir "${{ runner.temp }}/iter203-shards" \
            --output-dir experiments/iter203_iter202_safety_recovery/proof/raw/execution \
            --aggregate-receipt experiments/iter203_iter202_safety_recovery/proof/raw/execution/_telos_iter203_execution_complete.receipt.json \
            --spec-index experiments/iter203_iter202_safety_recovery/proof/raw/specs/index.json \
            --runtime-manifest experiments/iter203_iter202_safety_recovery/proof/raw/runtime_manifest.json
          python3 -I -S scripts/collect_iter203_execution.py check \
            --execution-dir experiments/iter203_iter202_safety_recovery/proof/raw/execution \
            --aggregate-receipt experiments/iter203_iter202_safety_recovery/proof/raw/execution/_telos_iter203_execution_complete.receipt.json \
            --spec-index experiments/iter203_iter202_safety_recovery/proof/raw/specs/index.json \
            --runtime-manifest experiments/iter203_iter202_safety_recovery/proof/raw/runtime_manifest.json
      - name: Upload complete verified execution corpus
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter203-execution-complete-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: experiments/iter203_iter202_safety_recovery/proof/raw/execution/
          if-no-files-found: error
          retention-days: 14
      - name: Upload collector failure evidence for debugging only
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter203-execution-collector-debug-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/iter203-shards/
            experiments/iter203_iter202_safety_recovery/proof/raw/execution/
          if-no-files-found: ignore
          retention-days: 14
