name: iter206-execute
on:
  workflow_dispatch:
    inputs:
      expected_primary_sha:
        description: Exact green master commit approved before the sole eligible iter206 dispatch
        required: true
        type: string
      expected_workflow_id:
        description: Server-assigned active iter206 workflow ID observed by the sole host preflight
        required: true
        type: string
      expected_iter204_release_run_id:
        description: Server-assigned iter204 run ID at exact run number 5 and merge parent 2
        required: true
        type: string
      expected_iter204_primary_run_id:
        description: Server-assigned iter204 run ID at exact run number 6 and approved primary merge
        required: true
        type: string
concurrency:
  group: iter206-canonical-execution
  cancel-in-progress: false
permissions:
  actions: read
  checks: read
  contents: read
jobs:
  authorize:
    name: authorize sole attempt-1 green-primary iter206 dispatch
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      primary_ci_authorization: ${{ steps.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify exact repository, primary ref, commit, and historical anchor
        env:
          EXPECTED_PRIMARY_SHA: ${{ inputs.expected_primary_sha }}
          EXPECTED_WORKFLOW_ID: ${{ inputs.expected_workflow_id }}
          EXPECTED_ITER204_RELEASE_RUN_ID: ${{ inputs.expected_iter204_release_run_id }}
          EXPECTED_ITER204_PRIMARY_RUN_ID: ${{ inputs.expected_iter204_primary_run_id }}
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "manfromnowhere143/telos"
          test "${GITHUB_REF}" = "refs/heads/master"
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test "${GITHUB_SHA}" = "${EXPECTED_PRIMARY_SHA}"
          [[ "${EXPECTED_PRIMARY_SHA}" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "${EXPECTED_PRIMARY_SHA}"
          test "$(git rev-parse refs/remotes/origin/master)" = "${EXPECTED_PRIMARY_SHA}"
          [[ "${EXPECTED_WORKFLOW_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${EXPECTED_ITER204_RELEASE_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${EXPECTED_ITER204_PRIMARY_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
          test "$(git rev-list --parents -n 1 "${EXPECTED_PRIMARY_SHA}" | wc -w | tr -d ' ')" = "3"
          test "$(git rev-parse "${EXPECTED_PRIMARY_SHA}^1")" = "4f7dd39bb171fd89c1bb7da3f265aa00aa6df63f"
          git rev-parse "${EXPECTED_PRIMARY_SHA}^2" >/dev/null
      - name: Verify exact iter205 pre-dispatch admission null
        run: python3 -I -S scripts/validate_iter205_pre_dispatch_null.py
      - name: Verify green primary CI and first canonical run identity
        id: authorize
        env:
          EXPECTED_PRIMARY_SHA: ${{ inputs.expected_primary_sha }}
          EXPECTED_WORKFLOW_ID: ${{ inputs.expected_workflow_id }}
          EXPECTED_ITER204_RELEASE_RUN_ID: ${{ inputs.expected_iter204_release_run_id }}
          EXPECTED_ITER204_PRIMARY_RUN_ID: ${{ inputs.expected_iter204_primary_run_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 -I -S - <<'PY'
          import base64
          import hashlib
          import json
          import os
          import subprocess
          import urllib.error
          import urllib.parse
          import urllib.request

          api_root = os.environ["GITHUB_API_URL"].rstrip("/")
          repository = os.environ["GITHUB_REPOSITORY"]
          expected_sha = os.environ["EXPECTED_PRIMARY_SHA"]
          expected_workflow_id = int(os.environ["EXPECTED_WORKFLOW_ID"])
          expected_iter204_release_run_id = int(
              os.environ["EXPECTED_ITER204_RELEASE_RUN_ID"]
          )
          expected_iter204_primary_run_id = int(
              os.environ["EXPECTED_ITER204_PRIMARY_RUN_ID"]
          )
          current_run_id = int(os.environ["GITHUB_RUN_ID"])
          current_run_attempt = int(os.environ["GITHUB_RUN_ATTEMPT"])
          current_run_number = int(os.environ["GITHUB_RUN_NUMBER"])
          token = os.environ["GH_TOKEN"]

          def get(path, parameters=None):
              query = "" if not parameters else "?" + urllib.parse.urlencode(parameters)
              request = urllib.request.Request(
                  f"{api_root}/repos/{repository}/{path}{query}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          def require_http_404(path):
              request = urllib.request.Request(
                  f"{api_root}/repos/{repository}/{path}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=30):
                      raise SystemExit("iter204 parse-failure logs unexpectedly exist")
              except urllib.error.HTTPError as exc:
                  try:
                      payload = json.loads(exc.read())
                  except (UnicodeError, json.JSONDecodeError) as decode_exc:
                      raise SystemExit("iter204 log 404 body is invalid") from decode_exc
                  if exc.code != 404 or payload.get("message") != "Not Found":
                      raise SystemExit("iter204 log endpoint did not return exact HTTP 404")

          def one_page_workflow_runs(path, *, event=None, extra_parameters=None):
              parameters = {"page": 1, "per_page": 100}
              if event is not None:
                  parameters["event"] = event
              if extra_parameters is not None:
                  parameters.update(extra_parameters)
              payload = get(path, parameters)
              rows = payload.get("workflow_runs")
              if (
                  not isinstance(rows, list)
                  or not isinstance(payload.get("total_count"), int)
                  or payload["total_count"] != len(rows)
                  or len(rows) > 100
                  or any(not isinstance(row, dict) for row in rows)
              ):
                  raise SystemExit("workflow history is not one exact bounded page")
              return rows

          def git_rev_parse(revision):
              return subprocess.check_output(
                  ["git", "rev-parse", revision], text=True, timeout=10
              ).strip()

          def canonical_sha256(value):
              encoded = json.dumps(
                  value,
                  sort_keys=True,
                  separators=(",", ":"),
                  allow_nan=False,
              ).encode()
              return hashlib.sha256(encoded).hexdigest()

          merge_first_parent = git_rev_parse(f"{expected_sha}^1")
          merge_second_parent = git_rev_parse(f"{expected_sha}^2")
          if merge_first_parent != "4f7dd39bb171fd89c1bb7da3f265aa00aa6df63f":
              raise SystemExit("iter206 approved merge first parent differs")

          iter206_workflow = get(f"actions/workflows/{expected_workflow_id}")
          if (
              iter206_workflow.get("id") != expected_workflow_id
              or iter206_workflow.get("name") != "iter206-execute"
              or iter206_workflow.get("path") != ".github/workflows/iter206-execute.yml"
              or iter206_workflow.get("state") != "active"
          ):
              raise SystemExit("iter206 workflow is not an active, server-accepted workflow")

          current = get(f"actions/runs/{current_run_id}")
          if (
              current.get("id") != current_run_id
              or current.get("workflow_id") != expected_workflow_id
              or current.get("name") != "iter206-execute"
              or current.get("event") != "workflow_dispatch"
              or current.get("head_branch") != "master"
              or current.get("head_sha") != expected_sha
              or current.get("path") != ".github/workflows/iter206-execute.yml"
              or current.get("run_number") != 1
              or current_run_number != 1
              or current.get("run_attempt") != 1
              or current_run_attempt != 1
              or current.get("pull_requests") != []
              or not isinstance(current.get("head_repository"), dict)
              or current["head_repository"].get("full_name") != repository
          ):
              raise SystemExit("current run is not the sole authorized attempt-1 master dispatch")

          iter206_runs = one_page_workflow_runs(
              f"actions/workflows/{expected_workflow_id}/runs"
          )
          iter206_dispatch_runs = one_page_workflow_runs(
              f"actions/workflows/{expected_workflow_id}/runs",
              event="workflow_dispatch",
          )
          if [row.get("id") for row in iter206_runs] != [current_run_id]:
              raise SystemExit("iter206 all-event history must contain only the current run")
          if [row.get("id") for row in iter206_dispatch_runs] != [current_run_id]:
              raise SystemExit("iter206 dispatch history must contain only the current run")

          iter205_workflow_id = 314141096
          iter205_workflow = get(f"actions/workflows/{iter205_workflow_id}")
          if (
              iter205_workflow.get("id") != iter205_workflow_id
              or iter205_workflow.get("name") != "iter205-execute"
              or iter205_workflow.get("path") != ".github/workflows/iter205-execute.yml"
              or iter205_workflow.get("state") != "active"
          ):
              raise SystemExit("the exact iter205 workflow identity differs")
          iter205_runs = one_page_workflow_runs(
              f"actions/workflows/{iter205_workflow_id}/runs"
          )
          iter205_dispatch_runs = one_page_workflow_runs(
              f"actions/workflows/{iter205_workflow_id}/runs",
              event="workflow_dispatch",
          )
          if iter205_runs != [] or iter205_dispatch_runs != []:
              raise SystemExit("iter205 all-event and dispatch histories must remain empty")

          iter204_workflow_id = 314113289
          iter204_workflow_path = ".github/workflows/iter204-execute.yml"
          iter204_workflow = get(f"actions/workflows/{iter204_workflow_id}")
          if (
              iter204_workflow.get("id") != iter204_workflow_id
              or iter204_workflow.get("name") != iter204_workflow_path
              or iter204_workflow.get("path") != iter204_workflow_path
              or iter204_workflow.get("state") != "active"
          ):
              raise SystemExit("the exact iter204 workflow identity differs")

          expected_iter204_runs = {
              1: {
                  "head_branch": "agent/iter204-infrastructure-recovery",
                  "head_sha": "8342315dd2fa7ec865bd7c654ec4ec098675dfab",
                  "id": 29465584664,
              },
              2: {
                  "head_branch": "master",
                  "head_sha": "c1137f896b7ee3c9a26ee35bcda2c5f5c6b79446",
                  "id": 29465924803,
              },
              3: {
                  "head_branch": "agent/iter205-workflow-context-recovery",
                  "head_sha": "a336b4909329d392f6db5f6098792e07a17f28cb",
                  "id": 29468669956,
              },
              4: {
                  "head_branch": "master",
                  "head_sha": "4f7dd39bb171fd89c1bb7da3f265aa00aa6df63f",
                  "id": 29468768706,
              },
              5: {
                  "head_branch": "agent/iter206-iter205-admission-recovery",
                  "head_sha": merge_second_parent,
                  "id": expected_iter204_release_run_id,
              },
              6: {
                  "head_branch": "master",
                  "head_sha": expected_sha,
                  "id": expected_iter204_primary_run_id,
              },
          }
          expected_ids = [row["id"] for row in expected_iter204_runs.values()]
          if len(set(expected_ids)) != 6:
              raise SystemExit("the six expected iter204 run IDs are not unique")

          iter204_runs = one_page_workflow_runs(
              f"actions/workflows/{iter204_workflow_id}/runs"
          )
          if len(iter204_runs) != 6:
              raise SystemExit("iter204 all-event history does not contain exactly six rows")
          run_numbers = [row.get("run_number") for row in iter204_runs]
          run_ids = [row.get("id") for row in iter204_runs]
          if set(run_numbers) != set(range(1, 7)) or len(set(run_ids)) != 6:
              raise SystemExit("iter204 run numbers or IDs are not exact and unique")
          iter204_by_number = {row["run_number"]: row for row in iter204_runs}

          iter204_projection = []
          for run_number in range(1, 7):
              expected = expected_iter204_runs[run_number]
              row = iter204_by_number[run_number]
              run_id = expected["id"]
              if (
                  row.get("id") != run_id
                  or row.get("workflow_id") != iter204_workflow_id
                  or row.get("name") != iter204_workflow_path
                  or row.get("path") != iter204_workflow_path
                  or row.get("event") != "push"
                  or row.get("head_branch") != expected["head_branch"]
                  or row.get("head_sha") != expected["head_sha"]
                  or row.get("run_attempt") != 1
                  or row.get("status") != "completed"
                  or row.get("conclusion") != "failure"
                  or row.get("pull_requests") != []
                  or not isinstance(row.get("head_repository"), dict)
                  or row["head_repository"].get("full_name") != repository
              ):
                  raise SystemExit("an exact iter204 parse-failure row differs")
              jobs = get(f"actions/runs/{run_id}/attempts/1/jobs", {"per_page": 100})
              artifacts = get(f"actions/runs/{run_id}/artifacts", {"per_page": 100})
              if jobs.get("total_count") != 0 or jobs.get("jobs") != []:
                  raise SystemExit("an iter204 parse failure unexpectedly started a job")
              if artifacts.get("total_count") != 0 or artifacts.get("artifacts") != []:
                  raise SystemExit("an iter204 parse failure unexpectedly retained an artifact")
              require_http_404(f"actions/runs/{run_id}/logs")
              iter204_projection.append(
                  {
                      "artifacts_count": 0,
                      "conclusion": "failure",
                      "event": "push",
                      "head_branch": expected["head_branch"],
                      "head_sha": expected["head_sha"],
                      "id": run_id,
                      "jobs_count": 0,
                      "logs_http_status": 404,
                      "name": iter204_workflow_path,
                      "path": iter204_workflow_path,
                      "pull_request_count": 0,
                      "run_attempt": 1,
                      "run_number": run_number,
                      "status": "completed",
                      "workflow_id": iter204_workflow_id,
                  }
              )

          iter204_dispatch_runs = one_page_workflow_runs(
              f"actions/workflows/{iter204_workflow_id}/runs",
              event="workflow_dispatch",
          )
          if iter204_dispatch_runs != []:
              raise SystemExit("iter204 workflow_dispatch history must remain empty")
          iter204_admission_history_sha256 = canonical_sha256(iter204_projection)

          release_branch = "agent/iter206-iter205-admission-recovery"
          release_required_job_names = ("verify py3.11", "verify py3.12")

          def exact_release_ci_run(event):
              rows = one_page_workflow_runs(
                  "actions/workflows/ci.yml/runs",
                  event=event,
                  extra_parameters={"head_sha": merge_second_parent},
              )
              if len(rows) != 1:
                  raise SystemExit(
                      f"release commit must have exactly one ci.yml {event} run"
                  )
              row = rows[0]
              run_id = row.get("id")
              head_repository = row.get("head_repository")
              if (
                  not isinstance(run_id, int)
                  or run_id < 1
                  or row.get("conclusion") != "success"
                  or row.get("event") != event
                  or row.get("head_branch") != release_branch
                  or row.get("head_sha") != merge_second_parent
                  or row.get("path") != ".github/workflows/ci.yml"
                  or row.get("run_attempt") != 1
                  or row.get("status") != "completed"
                  or not isinstance(head_repository, dict)
                  or head_repository.get("full_name") != repository
              ):
                  raise SystemExit(f"the exact release ci.yml {event} run differs")

              jobs_payload = get(
                  f"actions/runs/{run_id}/attempts/1/jobs",
                  {"page": 1, "per_page": 100},
              )
              jobs = jobs_payload.get("jobs")
              if (
                  jobs_payload.get("total_count") != 2
                  or not isinstance(jobs, list)
                  or len(jobs) != 2
                  or any(not isinstance(job, dict) for job in jobs)
              ):
                  raise SystemExit(f"release ci.yml {event} job set is not exact")
              by_name = {job.get("name"): job for job in jobs}
              if set(by_name) != set(release_required_job_names):
                  raise SystemExit(f"release ci.yml {event} required jobs differ")

              required_jobs = []
              for name in release_required_job_names:
                  job = by_name[name]
                  job_id = job.get("id")
                  expected_url = (
                      f"https://github.com/{repository}/actions/runs/{run_id}/job/{job_id}"
                  )
                  if (
                      not isinstance(job_id, int)
                      or job_id < 1
                      or job.get("conclusion") != "success"
                      or job.get("head_sha") != merge_second_parent
                      or job.get("html_url") != expected_url
                      or job.get("run_attempt") != 1
                      or job.get("status") != "completed"
                  ):
                      raise SystemExit(
                          f"release ci.yml {event} job is not exact/success: {name}"
                      )
                  required_jobs.append(
                      {
                          "conclusion": "success",
                          "head_sha": merge_second_parent,
                          "id": job_id,
                          "name": name,
                          "run_attempt": 1,
                          "status": "completed",
                      }
                  )
              if len({job["id"] for job in required_jobs}) != 2:
                  raise SystemExit(f"release ci.yml {event} job IDs must be unique")
              return {
                  "conclusion": "success",
                  "event": event,
                  "head_branch": release_branch,
                  "head_repository": {"full_name": repository},
                  "head_sha": merge_second_parent,
                  "id": run_id,
                  "path": ".github/workflows/ci.yml",
                  "required_jobs": required_jobs,
                  "run_attempt": 1,
                  "status": "completed",
              }

          release_ci_runs = [
              exact_release_ci_run("push"),
              exact_release_ci_run("pull_request"),
          ]
          if release_ci_runs[0]["id"] == release_ci_runs[1]["id"]:
              raise SystemExit("release push and pull_request CI run IDs must differ")

          ci_runs = one_page_workflow_runs(
              "actions/workflows/ci.yml/runs",
              event="push",
              extra_parameters={"branch": "master", "head_sha": expected_sha},
          )
          if len(ci_runs) != 1:
              raise SystemExit("approved primary commit must have exactly one ci.yml push run")
          ci_run = ci_runs[0]
          ci_run_id = ci_run.get("id")
          ci_run_attempt = ci_run.get("run_attempt")
          if (
              not isinstance(ci_run_id, int)
              or ci_run.get("event") != "push"
              or ci_run.get("head_branch") != "master"
              or ci_run.get("head_sha") != expected_sha
              or ci_run.get("path") != ".github/workflows/ci.yml"
              or ci_run_attempt != 1
              or ci_run.get("status") != "completed"
              or ci_run.get("conclusion") != "success"
          ):
              raise SystemExit("the exact approved primary ci.yml run differs")

          check_rows = []
          for page in range(1, 11):
              payload = get(
                  f"commits/{expected_sha}/check-runs",
                  {"filter": "all", "page": page, "per_page": 100},
              )
              rows = payload.get("check_runs")
              if not isinstance(rows, list) or any(
                  not isinstance(row, dict) for row in rows
              ):
                  raise SystemExit("cannot enumerate primary CI check runs")
              check_rows.extend(rows)
              if len(rows) < 100:
                  break
          else:
              raise SystemExit("primary CI check history exceeds the bounded audit window")

          required_names = ("verify py3.11", "verify py3.12")
          selected_checks = []
          for name in required_names:
              expected_prefix = (
                  f"https://github.com/{repository}/actions/runs/{ci_run_id}/job/"
              )
              candidates = [
                  row
                  for row in check_rows
                  if row.get("name") == name
                  and row.get("status") == "completed"
                  and row.get("conclusion") == "success"
                  and isinstance(row.get("app"), dict)
                  and row["app"].get("slug") == "github-actions"
                  and isinstance(row.get("id"), int)
                  and row["id"] > 0
                  and row.get("details_url") == f"{expected_prefix}{row['id']}"
              ]
              if len(candidates) != 1:
                  raise SystemExit(f"required primary CI check is not unique/success: {name}")
              selected = candidates[0]
              selected_checks.append(
                  {
                      "app_slug": "github-actions",
                      "conclusion": "success",
                      "details_url": selected["details_url"],
                      "id": selected["id"],
                      "name": name,
                      "status": "completed",
                  }
              )
          if selected_checks[0]["id"] == selected_checks[1]["id"]:
              raise SystemExit("required primary CI check IDs must be unique")

          authorization = {
              "approved_commit_sha": expected_sha,
              "current_run_attempt": current_run_attempt,
              "current_run_id": current_run_id,
              "iter204_admission_history_sha256": iter204_admission_history_sha256,
              "iter204_dispatch_count": len(iter204_dispatch_runs),
              "iter204_primary_run_id": expected_iter204_primary_run_id,
              "iter204_release_run_id": expected_iter204_release_run_id,
              "iter204_workflow_id": iter204_workflow_id,
              "iter205_all_event_count": len(iter205_runs),
              "iter205_dispatch_count": len(iter205_dispatch_runs),
              "iter205_workflow_id": iter205_workflow_id,
              "iter206_workflow_id": expected_workflow_id,
              "merge_first_parent": merge_first_parent,
              "merge_second_parent": merge_second_parent,
              "primary_ci_event": "push",
              "primary_ci_head_branch": "master",
              "primary_ci_run_attempt": ci_run_attempt,
              "primary_ci_run_id": ci_run_id,
              "primary_ci_workflow_path": ".github/workflows/ci.yml",
              "release_ci_head_sha": merge_second_parent,
              "release_ci_runs": release_ci_runs,
              "required_checks": selected_checks,
              "schema_version": "telos.iter206.primary_ci_authorization.v2",
          }
          encoded = base64.urlsafe_b64encode(
              json.dumps(
                  authorization,
                  sort_keys=True,
                  separators=(",", ":"),
                  allow_nan=False,
              ).encode()
          ).decode()
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"primary_ci_authorization={encoded}\n")
          PY

  smoke:
    name: iter206 no-science exact log-driver smoke
    needs: authorize
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      TELOS_ITER206_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
      - name: Verify frozen scientific inputs and additive iter206 runtime
        run: |
          python3 -I -S scripts/build_iter203_safety_recovery.py --check
          python3 -I -S scripts/build_iter203_runtime_manifest.py --check
          python3 -I -S scripts/validate_iter204_pre_dispatch_null.py
          python3 -I -S scripts/build_iter206_runtime_manifest.py --check
      - name: Run no-science log-driver smoke
        run: bash scripts/ci_iter206_smoke.sh
      - name: Upload bounded smoke evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter206-no-science-smoke-${{ github.run_id }}-attempt-1
          path: |
            experiments/iter206_iter205_admission_history_recovery/proof/raw/smoke/*.json
            experiments/iter206_iter205_admission_history_recovery/proof/raw/smoke/*.diagnostic.log
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14

  execute:
    name: iter206 certify all + execute safe witness shard ${{ matrix.shard }}/8
    needs: [authorize, smoke]
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    env:
      TELOS_ITER206_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
      TELOS_ITER206_SHARD_COUNT: 8
      TELOS_ITER206_SHARD_INDEX: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
      - name: Download exact successful same-run smoke evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: iter206-no-science-smoke-${{ github.run_id }}-attempt-1
          path: ${{ runner.temp }}/iter206-smoke
      - name: Verify frozen scientific inputs and additive iter206 runtime
        run: |
          python3 -I -S scripts/build_iter203_safety_recovery.py --check
          python3 -I -S scripts/build_iter203_runtime_manifest.py --check
          python3 -I -S scripts/validate_iter204_pre_dispatch_null.py
          python3 -I -S scripts/build_iter206_runtime_manifest.py --check
      - name: Run iter206 execution shard
        env:
          TELOS_ITER206_SMOKE_RECEIPT: ${{ runner.temp }}/iter206-smoke/smoke.receipt.json
        run: bash scripts/ci_iter206_execute.sh
      - name: Upload receipt-eligible shard evidence
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter206-execution-run-${{ github.run_id }}-attempt-1-shard-${{ matrix.shard }}-of-8
          path: experiments/iter206_iter205_admission_history_recovery/proof/raw/execution/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 14
      - name: Upload bounded visible runtime diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter206-runtime-diagnostics-${{ github.run_id }}-attempt-1-shard-${{ matrix.shard }}-of-8
          path: |
            experiments/iter206_iter205_admission_history_recovery/proof/raw/runtime_diagnostics/*.json
            experiments/iter206_iter205_admission_history_recovery/proof/raw/runtime_diagnostics/*.diagnostic.log
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14
      - name: Upload partial scientific evidence for debugging only
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter206-execution-debug-${{ github.run_id }}-attempt-1-shard-${{ matrix.shard }}-of-8
          path: experiments/iter206_iter205_admission_history_recovery/proof/raw/execution/
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14

  collect:
    name: iter206 collect exact attempt-1 eight-shard corpus
    needs: [authorize, smoke, execute]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TELOS_ITER206_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download receipt-eligible attempt-1 shards without merging
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: iter206-execution-run-${{ github.run_id }}-attempt-1-shard-*-of-8
          path: ${{ runner.temp }}/iter206-shards
          merge-multiple: false
      - name: Collect and verify exact execution corpus
        run: |
          python3 -I -S scripts/collect_iter206_execution.py collect \
            --artifacts-dir "${{ runner.temp }}/iter206-shards" \
            --output-dir experiments/iter206_iter205_admission_history_recovery/proof/raw/execution \
            --aggregate-receipt experiments/iter206_iter205_admission_history_recovery/proof/raw/execution/_telos_iter206_execution_complete.receipt.json \
            --spec-index experiments/iter203_iter202_safety_recovery/proof/raw/specs/index.json \
            --runtime-manifest experiments/iter206_iter205_admission_history_recovery/proof/raw/runtime_manifest.json
          python3 -I -S scripts/collect_iter206_execution.py check \
            --execution-dir experiments/iter206_iter205_admission_history_recovery/proof/raw/execution \
            --aggregate-receipt experiments/iter206_iter205_admission_history_recovery/proof/raw/execution/_telos_iter206_execution_complete.receipt.json \
            --spec-index experiments/iter203_iter202_safety_recovery/proof/raw/specs/index.json \
            --runtime-manifest experiments/iter206_iter205_admission_history_recovery/proof/raw/runtime_manifest.json
      - name: Upload complete verified execution corpus
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter206-execution-complete-${{ github.run_id }}-attempt-1
          path: experiments/iter206_iter205_admission_history_recovery/proof/raw/execution/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 14
      - name: Upload collector failure evidence for debugging only
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter206-execution-collector-debug-${{ github.run_id }}-attempt-1
          path: |
            ${{ runner.temp }}/iter206-shards/
            experiments/iter206_iter205_admission_history_recovery/proof/raw/execution/
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14
