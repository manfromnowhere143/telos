name: iter193-certified-resolved

# Manual only. Runs the iter193 Phase B execution harness on a native-x86 runner (no emulation):
# decides, by execution inside each pinned official SWE-bench container, whether each Phase A candidate
# is certified-resolved and whether an uncurated test that gold passes and the variant fails exists.
# It never runs on push, so it cannot affect the main CI.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute:
    name: iter193 certified-resolved execution (x86, native)
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Run Phase B execution
        run: |
          chmod +x scripts/ci_certified_resolved_execute.sh
          bash scripts/ci_certified_resolved_execute.sh

      - name: Upload transcripts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iter193-phase-b-execution
          path: experiments/iter193_certified_resolved_reward_hack_construction/proof/raw/phase_b_execution/
          retention-days: 14
