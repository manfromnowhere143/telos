name: iter204-execute
on:
  workflow_dispatch:
    inputs:
      expected_primary_sha:
        description: Exact green master commit approved before the sole eligible iter204 dispatch
        required: true
        type: string
concurrency:
  group: iter204-canonical-execution
  cancel-in-progress: false
permissions:
  actions: read
  checks: read
  contents: read
jobs:
  authorize:
    name: authorize sole attempt-1 green-primary iter204 dispatch
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      primary_ci_authorization: ${{ steps.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify exact repository, primary ref, commit, and historical anchor
        env:
          EXPECTED_PRIMARY_SHA: ${{ inputs.expected_primary_sha }}
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "manfromnowhere143/telos"
          test "${GITHUB_REF}" = "refs/heads/master"
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test "${GITHUB_SHA}" = "${EXPECTED_PRIMARY_SHA}"
          [[ "${EXPECTED_PRIMARY_SHA}" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "${EXPECTED_PRIMARY_SHA}"
          git cat-file -e 5c409f79c9333206cff9ed80d59c08aa347110f6^{commit}
          git merge-base --is-ancestor 5c409f79c9333206cff9ed80d59c08aa347110f6 "${EXPECTED_PRIMARY_SHA}"
      - name: Verify green primary CI and first canonical run identity
        id: authorize
        env:
          EXPECTED_PRIMARY_SHA: ${{ inputs.expected_primary_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 -I -S - <<'PY'
          import json
          import base64
          import os
          import urllib.parse
          import urllib.request

          api_root = os.environ["GITHUB_API_URL"].rstrip("/")
          repository = os.environ["GITHUB_REPOSITORY"]
          expected_sha = os.environ["EXPECTED_PRIMARY_SHA"]
          current_run_id = int(os.environ["GITHUB_RUN_ID"])
          current_attempt = int(os.environ["GITHUB_RUN_ATTEMPT"])
          token = os.environ["GH_TOKEN"]

          def get(path, parameters=None):
              query = "" if not parameters else "?" + urllib.parse.urlencode(parameters)
              request = urllib.request.Request(
                  f"{api_root}/repos/{repository}/{path}{query}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          current = get(f"actions/runs/{current_run_id}")
          if (
              current.get("event") != "workflow_dispatch"
              or current.get("head_branch") != "master"
              or current.get("head_sha") != expected_sha
              or current.get("path") != ".github/workflows/iter204-execute.yml"
              or current.get("run_attempt") != 1
              or current_attempt != 1
          ):
              raise SystemExit("current run is not the sole authorized attempt-1 master dispatch")

          iter204_runs = []
          for page in range(1, 11):
              payload = get(
                  "actions/workflows/iter204-execute.yml/runs",
                  {
                      "event": "workflow_dispatch",
                      "page": page,
                      "per_page": 100,
                  },
              )
              rows = payload.get("workflow_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate global iter204 workflow history")
              iter204_runs.extend(
                  int(row["id"])
                  for row in rows
                  if isinstance(row.get("id"), int)
              )
              if len(rows) < 100:
                  break
          else:
              raise SystemExit("iter204 workflow history exceeds the bounded audit window")
          if sorted(set(iter204_runs)) != [current_run_id]:
              raise SystemExit(
                  "iter204 permits exactly one global workflow dispatch and attempt 1 only"
              )

          iter203_run_id = 29460393525
          iter203 = get(f"actions/runs/{iter203_run_id}")
          if (
              iter203.get("id") != iter203_run_id
              or iter203.get("run_attempt") != 1
              or iter203.get("event") != "workflow_dispatch"
              or iter203.get("head_branch") != "master"
              or iter203.get("head_sha") != "5c409f79c9333206cff9ed80d59c08aa347110f6"
              or iter203.get("path") != ".github/workflows/iter203-execute.yml"
              or iter203.get("status") != "completed"
              or iter203.get("conclusion") != "failure"
          ):
              raise SystemExit("the exact iter203 attempt-1 infrastructure null anchor differs")

          historical_iter203_runs = []
          for page in range(1, 11):
              payload = get(
                  "actions/workflows/iter203-execute.yml/runs",
                  {"event": "workflow_dispatch", "page": page, "per_page": 100},
              )
              rows = payload.get("workflow_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate iter203 workflow dispatch history")
              historical_iter203_runs.extend(
                  int(row["id"]) for row in rows if isinstance(row.get("id"), int)
              )
              if len(rows) < 100:
                  break
          else:
              raise SystemExit("iter203 workflow history exceeds the bounded audit window")
          if sorted(set(historical_iter203_runs)) != [iter203_run_id]:
              raise SystemExit("iter203 has a rerun source or second dispatch")

          jobs = get(f"actions/runs/{iter203_run_id}/attempts/1/jobs", {"per_page": 100})
          job_rows = jobs.get("jobs")
          if not isinstance(job_rows, list) or len(job_rows) != 10:
              raise SystemExit("iter203 attempt-1 job inventory differs")
          by_id = {row.get("id"): row for row in job_rows if isinstance(row, dict)}
          expected_failed_shards = {
              87502505248, 87502505271, 87502505320, 87502505249,
              87502505263, 87502505241, 87502505328, 87502505277,
          }
          if (
              by_id.get(87502469240, {}).get("conclusion") != "success"
              or by_id.get(87503534378, {}).get("conclusion") != "skipped"
              or {
                  job_id for job_id in expected_failed_shards
                  if by_id.get(job_id, {}).get("conclusion") == "failure"
              }
              != expected_failed_shards
              or set(by_id) != expected_failed_shards | {87502469240, 87503534378}
          ):
              raise SystemExit("iter203 authorization/shard/collector conclusions differ")
          artifacts = get(f"actions/runs/{iter203_run_id}/artifacts", {"per_page": 100})
          if artifacts.get("total_count") != 0 or artifacts.get("artifacts") != []:
              raise SystemExit("iter203 unexpectedly has a retained workflow artifact")

          ci_runs = []
          for page in range(1, 11):
              payload = get(
                  "actions/workflows/ci.yml/runs",
                  {
                      "branch": "master",
                      "event": "push",
                      "page": page,
                      "per_page": 100,
                      "status": "completed",
                  },
              )
              rows = payload.get("workflow_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate primary CI runs")
              ci_runs.extend(
                  row
                  for row in rows
                  if row.get("head_sha") == expected_sha
                  and row.get("head_branch") == "master"
                  and row.get("event") == "push"
                  and row.get("path") == ".github/workflows/ci.yml"
                  and row.get("status") == "completed"
                  and row.get("conclusion") == "success"
              )
              if len(rows) < 100:
                  break
          if len({row.get("id") for row in ci_runs}) != 1:
              raise SystemExit("approved primary commit has no successful completed ci.yml push run")
          ci_run = max(ci_runs, key=lambda row: int(row.get("run_attempt", 0)))
          ci_run_id = ci_run.get("id")
          ci_run_attempt = ci_run.get("run_attempt")
          if not isinstance(ci_run_id, int) or not isinstance(ci_run_attempt, int):
              raise SystemExit("primary CI run identity is malformed")

          check_rows = []
          for page in range(1, 11):
              payload = get(
                  f"commits/{expected_sha}/check-runs",
                  {"filter": "all", "page": page, "per_page": 100},
              )
              rows = payload.get("check_runs")
              if not isinstance(rows, list):
                  raise SystemExit("cannot enumerate primary CI check runs")
              check_rows.extend(rows)
              if len(rows) < 100:
                  break
          else:
              raise SystemExit("primary CI check history exceeds the bounded audit window")

          required_names = ("verify py3.11", "verify py3.12")
          selected_checks = []
          for name in required_names:
              expected_prefix = (
                  f"https://github.com/{repository}/actions/runs/{ci_run_id}/job/"
              )
              candidates = [
                  row
                  for row in check_rows
                  if row.get("name") == name
                  and row.get("status") == "completed"
                  and row.get("conclusion") == "success"
                  and isinstance(row.get("app"), dict)
                  and row["app"].get("slug") == "github-actions"
                  and isinstance(row.get("id"), int)
                  and row.get("details_url") == f"{expected_prefix}{row['id']}"
              ]
              if not candidates:
                  raise SystemExit(f"required primary CI check is not complete/success: {name}")
              selected = max(candidates, key=lambda row: row["id"])
              selected_checks.append(
                  {
                      "app_slug": "github-actions",
                      "conclusion": "success",
                      "details_url": selected["details_url"],
                      "id": selected["id"],
                      "name": name,
                      "status": "completed",
                  }
              )

          authorization = {
              "approved_commit_sha": expected_sha,
              "primary_ci_event": "push",
              "primary_ci_head_branch": "master",
              "primary_ci_run_attempt": ci_run_attempt,
              "primary_ci_run_id": ci_run_id,
              "primary_ci_workflow_path": ".github/workflows/ci.yml",
              "required_checks": selected_checks,
              "schema_version": "telos.iter204.primary_ci_authorization.v1",
          }
          encoded = base64.urlsafe_b64encode(
              json.dumps(
                  authorization,
                  sort_keys=True,
                  separators=(",", ":"),
                  allow_nan=False,
              ).encode()
          ).decode()
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"primary_ci_authorization={encoded}\n")
          PY

  smoke:
    name: iter204 no-science exact log-driver smoke
    needs: authorize
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      TELOS_ITER204_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
      - name: Verify frozen iter203 and additive iter204 runtimes
        run: |
          python3 -I -S scripts/build_iter203_safety_recovery.py --check
          python3 -I -S scripts/build_iter203_runtime_manifest.py --check
          python3 -I -S scripts/build_iter204_runtime_manifest.py --check
      - name: Run no-science log-driver smoke
        run: bash scripts/ci_iter204_smoke.sh
      - name: Upload bounded smoke evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter204-no-science-smoke-${{ github.run_id }}-attempt-1
          path: |
            experiments/iter204_iter203_infrastructure_recovery/proof/raw/smoke/*.json
            experiments/iter204_iter203_infrastructure_recovery/proof/raw/smoke/*.diagnostic.log
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14

  execute:
    name: iter204 certify all + execute safe witness shard ${{ matrix.shard }}/8
    needs: [authorize, smoke]
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    env:
      TELOS_ITER204_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
      TELOS_ITER204_SHARD_COUNT: 8
      TELOS_ITER204_SHARD_INDEX: ${{ matrix.shard }}
      TELOS_ITER204_SMOKE_RECEIPT: ${{ runner.temp }}/iter204-smoke/smoke.receipt.json
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
      - name: Download exact successful same-run smoke evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: iter204-no-science-smoke-${{ github.run_id }}-attempt-1
          path: ${{ runner.temp }}/iter204-smoke
      - name: Verify frozen iter203 and additive iter204 runtimes
        run: |
          python3 -I -S scripts/build_iter203_safety_recovery.py --check
          python3 -I -S scripts/build_iter203_runtime_manifest.py --check
          python3 -I -S scripts/build_iter204_runtime_manifest.py --check
      - name: Run iter204 execution shard
        run: bash scripts/ci_iter204_execute.sh
      - name: Upload receipt-eligible shard evidence
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter204-execution-run-${{ github.run_id }}-attempt-1-shard-${{ matrix.shard }}-of-8
          path: experiments/iter204_iter203_infrastructure_recovery/proof/raw/execution/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 14
      - name: Upload bounded visible runtime diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter204-runtime-diagnostics-${{ github.run_id }}-attempt-1-shard-${{ matrix.shard }}-of-8
          path: |
            experiments/iter204_iter203_infrastructure_recovery/proof/raw/runtime_diagnostics/*.json
            experiments/iter204_iter203_infrastructure_recovery/proof/raw/runtime_diagnostics/*.diagnostic.log
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14
      - name: Upload partial scientific evidence for debugging only
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter204-execution-debug-${{ github.run_id }}-attempt-1-shard-${{ matrix.shard }}-of-8
          path: experiments/iter204_iter203_infrastructure_recovery/proof/raw/execution/
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14

  collect:
    name: iter204 collect exact attempt-1 eight-shard corpus
    needs: [authorize, smoke, execute]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TELOS_ITER204_PRIMARY_CI_AUTHORIZATION: ${{ needs.authorize.outputs.primary_ci_authorization }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download receipt-eligible attempt-1 shards without merging
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: iter204-execution-run-${{ github.run_id }}-attempt-1-shard-*-of-8
          path: ${{ runner.temp }}/iter204-shards
          merge-multiple: false
      - name: Collect and verify exact execution corpus
        run: |
          python3 -I -S scripts/collect_iter204_execution.py collect \
            --artifacts-dir "${{ runner.temp }}/iter204-shards" \
            --output-dir experiments/iter204_iter203_infrastructure_recovery/proof/raw/execution \
            --aggregate-receipt experiments/iter204_iter203_infrastructure_recovery/proof/raw/execution/_telos_iter204_execution_complete.receipt.json \
            --spec-index experiments/iter203_iter202_safety_recovery/proof/raw/specs/index.json \
            --runtime-manifest experiments/iter204_iter203_infrastructure_recovery/proof/raw/runtime_manifest.json
          python3 -I -S scripts/collect_iter204_execution.py check \
            --execution-dir experiments/iter204_iter203_infrastructure_recovery/proof/raw/execution \
            --aggregate-receipt experiments/iter204_iter203_infrastructure_recovery/proof/raw/execution/_telos_iter204_execution_complete.receipt.json \
            --spec-index experiments/iter203_iter202_safety_recovery/proof/raw/specs/index.json \
            --runtime-manifest experiments/iter204_iter203_infrastructure_recovery/proof/raw/runtime_manifest.json
      - name: Upload complete verified execution corpus
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter204-execution-complete-${{ github.run_id }}-attempt-1
          path: experiments/iter204_iter203_infrastructure_recovery/proof/raw/execution/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 14
      - name: Upload collector failure evidence for debugging only
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iter204-execution-collector-debug-${{ github.run_id }}-attempt-1
          path: |
            ${{ runner.temp }}/iter204-shards/
            experiments/iter204_iter203_infrastructure_recovery/proof/raw/execution/
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 14
