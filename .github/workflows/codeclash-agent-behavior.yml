name: codeclash-agent-behavior

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  battlesnake-instant-submit:
    name: battlesnake instant-submit pvp
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CODECLASH_COMMIT: 381cdfa05a35e8acd35853b9fc7e13005121b127
      CODECLASH_DIR: /tmp/telos-codeclash
      CODECLASH_OUT: /tmp/telos-codeclash-agent-behavior-smoke
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.16"

      - name: Docker readiness
        run: |
          docker version
          docker info

      - name: Clone pinned CodeClash
        run: |
          git clone https://github.com/CodeClash-ai/CodeClash.git "$CODECLASH_DIR"
          cd "$CODECLASH_DIR"
          git checkout "$CODECLASH_COMMIT"
          git rev-parse HEAD | tee /tmp/telos-codeclash-commit.txt

      - name: Install CodeClash
        run: |
          cd "$CODECLASH_DIR"
          uv sync --python 3.11 --extra dev

      - name: CodeClash BattleSnake instant-submit run
        run: |
          rm -rf "$CODECLASH_OUT"
          mkdir -p "$CODECLASH_OUT"
          cd "$CODECLASH_DIR"
          uv run codeclash run configs/test/battlesnake_pvp_test.yaml -o "$CODECLASH_OUT" 2>&1 | tee /tmp/telos-codeclash-agent-behavior-run.log

      - name: Summarize agent behavior artifacts
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          out = Path(os.environ["CODECLASH_OUT"])
          metadata_files = sorted(out.glob("*/metadata.json"))
          if not metadata_files:
              raise SystemExit(f"no metadata.json found under {out}")

          metadata_path = metadata_files[-1]
          metadata = json.loads(metadata_path.read_text())
          round_stats = metadata.get("round_stats", {})
          if not round_stats:
              raise SystemExit("metadata has no round_stats")

          trajectories = sorted(out.glob("*/players/p1/*.traj.json"))
          if not trajectories:
              raise SystemExit("missing p1 Mini-SWE-Agent trajectory")

          p1 = next((agent for agent in metadata.get("agents", []) if agent.get("name") == "p1"), None)
          if not p1:
              raise SystemExit("metadata missing p1 agent")

          agent_stats = p1.get("agent_stats", {})
          if not agent_stats:
              raise SystemExit("p1 agent_stats missing")
          for round_id, stats in agent_stats.items():
              if stats.get("cost") not in (0, 0.0):
                  raise SystemExit(f"p1 round {round_id} cost was not zero: {stats}")
              if int(stats.get("api_calls", 0)) < 1:
                  raise SystemExit(f"p1 round {round_id} had no deterministic model invocation: {stats}")

          change_files = sorted(out.glob("*/players/*/changes_r*.json"))
          if not change_files:
              raise SystemExit("missing player change files")

          summary = {
              "schema_version": "telos.agent_behavior_smoke.summary.v1",
              "codeclash_commit": os.environ["CODECLASH_COMMIT"],
              "config": "configs/test/battlesnake_pvp_test.yaml",
              "output_root": str(out),
              "metadata_path": str(metadata_path),
              "tournament_id": metadata.get("tournament_id"),
              "game": metadata.get("game", {}).get("name"),
              "round_count": len(round_stats),
              "agent_names": [agent.get("name") for agent in metadata.get("agents", [])],
              "p1_agent_stats": agent_stats,
              "p1_provider_cost_zero": all(stats.get("cost") in (0, 0.0) for stats in agent_stats.values()),
              "p1_model_invocations": sum(int(stats.get("api_calls", 0)) for stats in agent_stats.values()),
              "p1_trajectory_paths": [str(path) for path in trajectories],
              "change_file_count": len(change_files),
          }
          Path("/tmp/telos-codeclash-agent-behavior-summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n"
          )
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Upload agent behavior artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codeclash-agent-behavior-smoke
          if-no-files-found: error
          path: |
            /tmp/telos-codeclash-agent-behavior-smoke/**
            /tmp/telos-codeclash-commit.txt
            /tmp/telos-codeclash-agent-behavior-run.log
            /tmp/telos-codeclash-agent-behavior-summary.json
